{% extends "layout.html" %}
{% block body %}
<div class="d-flex justify-content-between align-items-center mb-3"><h2>Artworks</h2></div>
<div class="card p-3 mb-4"><form method="post" action="{{ url_for('add_artwork') }}" class="row g-2">
    <div class="col-md-2"><input class="form-control" name="title" placeholder="Title" required></div>
    <div class="col-md-1"><input type="number" class="form-control" name="year" placeholder="Year" required></div>
    <div class="col-md-1"><input class="form-control" name="type" placeholder="Type" required></div>
    <div class="col-md-2"><input type="number" step="0.01" class="form-control" name="price" placeholder="Price" required></div>
    <div class="col-md-1"><input type="number" class="form-control" name="artist_id" placeholder="Artist ID" required></div>
    <div class="col-md-1"><input type="number" class="form-control" name="artwork_id" placeholder="ID" required></div>
    <div class="col-md-2"><button class="btn btn-success w-100" type="submit">Add Artwork</button></div>
  </form></div>
<div class="table-responsive card p-3"><table class="table table-hover align-middle"><thead><tr><th>ID</th><th>Title</th><th>Year</th><th>Type</th><th>Price</th><th>Artist ID</th><th>Actions</th></tr></thead><tbody>
    {% for art in artworks %}<tr><td>{{ art.artwork_id }}</td><td>{{ art.title }}</td><td>{{ art.year }}</td><td>{{ art.type }}</td><td>${{ '%.2f'|format(art.price) }}</td><td>{{ art.artist_id }}</td><td><a class="btn btn-danger btn-sm" href="{{ url_for('delete_artwork', artwork_id=art.artwork_id) }}">Delete</a></td></tr>{% else %}<tr><td colspan="7">No artworks found.</td></tr>{% endfor %}
  </tbody></table></div>
{% endblock %}
