{% extends "layout.html" %}
{% block body %}
<div class="d-flex justify-content-between align-items-center mb-3"><h2>Categories</h2></div>
<div class="card p-3 mb-4"><form method="post" action="{{ url_for('add_category') }}" class="row g-2">
    <div class="col-md-3"><input type="number" class="form-control" name="category_id" placeholder="ID" required></div>
    <div class="col-md-6"><input class="form-control" name="category_name" placeholder="Category Name" required></div>
    <div class="col-md-2"><button class="btn btn-success w-100" type="submit">Add Category</button></div>
  </form></div>
<div class="table-responsive card p-3"><table class="table table-hover align-middle"><thead><tr><th>ID</th><th>Name</th><th>Actions</th></tr></thead><tbody>
    {% for category in categories %}<tr><td>{{ category.category_id }}</td><td>{{ category.category_name }}</td><td><a class="btn btn-danger btn-sm" href="{{ url_for('delete_category', category_id=category.category_id) }}">Delete</a></td></tr>{% else %}<tr><td colspan="3">No categories yet.</td></tr>{% endfor %}
  </tbody></table></div>
{% endblock %}
